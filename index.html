<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الخيل - DR.S</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-base: #0b0f15;
      --surface: #121821;
      --surface-card: #161e2b;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #d4af37;
      --text-main: #f8fafc;
      --text-muted: #8c9cb6;
      --radius-lg: 32px;
      --radius-md: 20px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Cairo', sans-serif; 
      background: var(--bg-base); 
      margin: 0; 
      padding: 0 0 100px 0; 
      text-align: center; 
      color: var(--text-main); 
      min-height: 100vh;
    }

    .app-container { 
      max-width: 460px; 
      margin: 0 auto; 
      padding: 16px;
      position: relative;
    }

    /* Top Hero Header Layout */
    .hero-card {
      position: relative;
      width: 100%;
      height: 350px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 14px;
      background: #000;
      border: 1px solid var(--border);
    }
    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11,15,21,0.15) 20%, rgba(11,15,21,0.96) 85%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: right;
    }
    .top-nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .icon-btn {
      background: rgba(18, 24, 33, 0.75);
      border: 1px solid var(--border);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      cursor: pointer;
      backdrop-filter: blur(12px);
    }
    .status-badge { 
      font-size: 12px; 
      font-weight: 600; 
      color: var(--text-muted); 
      padding: 6px 16px; 
      background: rgba(18, 24, 33, 0.75); 
      border: 1px solid var(--border); 
      border-radius: 20px; 
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; display: inline-block; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 8px #10b981; }

    .hero-main-content {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }
    .hero-title-text h1 {
      font-size: 30px;
      font-weight: 900;
      margin: 0;
      color: #fff;
      line-height: 1.15;
    }
    
    .dr-badge-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .dr-brand-tag {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 20%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
      border-right: 2px solid var(--primary);
      padding-right: 8px;
    }

    .hero-title-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin: 4px 0 0 0;
    }
    .logo-badge {
      width: 54px;
      height: 54px;
      background: rgba(18, 24, 33, 0.85);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      flex-shrink: 0;
    }

    /* Top Stats Grid */
    .top-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .mini-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      text-align: right;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mini-stat-info .label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }
    .mini-stat-info .val { font-size: 20px; font-weight: 800; color: #fff; }
    .mini-stat-info .unit { font-size: 10px; color: var(--text-muted); }
    .mini-stat-icon { color: var(--primary); background: rgba(255,255,255,0.03); width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }

    /* Map Box Card */
    .map-box-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 14px;
      text-align: right;
    }
    .map-header-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .canvas-container { 
      position: relative; 
      width: 100%; 
      height: 190px;
      background: #080c10; 
      border: 1px solid var(--border); 
      border-radius: 14px; 
      overflow: hidden; 
      cursor: grab; 
      touch-action: none;
      user-select: none; 
    }
    .canvas-background-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.2;
      pointer-events: none;
    }
    .canvas-container:active { cursor: grabbing; }
    #pathCanvas { width: 100%; height: 100%; display: block; position: relative; z-index: 2; }
    
    .map-controls-abs {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 5;
    }
    .btn-reset-map {
      background: rgba(18, 24, 33, 0.85);
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 11px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
    }

    /* Tip strip */
    .tip-strip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 14px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* History Strip */
    .history-strip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .history-strip-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

    /* Main Dashboard Control Card */
    .main-control-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .main-stats-split {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .side-stat-box {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: right;
      position: relative;
      overflow: hidden;
      height: 105px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .side-stat-box img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 75px;
      opacity: 0.15;
      pointer-events: none;
    }
    .side-stat-box .h { font-size: 11px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 4px; z-index: 2; }
    .side-stat-box .v { font-size: 20px; font-weight: 800; color: #fff; z-index: 2; }

    /* Speedometer Circle */
    .speedometer-circle {
      width: 175px;
      height: 175px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 75%);
      border: 2px solid var(--border);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }
    .speedometer-circle::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--primary);
      animation: spinGlow 4s linear infinite;
    }
    @keyframes spinGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .speed-horse-icon { color: var(--primary); margin-bottom: 2px; }
    .speed-main-val { font-size: 42px; font-weight: 900; line-height: 1; color: #fff; }
    .speed-main-unit { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-top: 4px; }

    /* Buttons Row */
    .action-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-custom {
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      transition: 0.2s;
    }
    .btn-start-pro { background: linear-gradient(135deg, #d4af37, #b3922b); color: #0b0f15; border: none; font-weight: 900; }
    .btn-stop-pro { background: var(--surface-card); color: #fca5a5; }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(18, 24, 33, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 10px 16px 10px;
      z-index: 1000;
      max-width: 460px;
      margin: 0 auto;
    }
    .nav-item {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Cairo', sans-serif;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 14px;
      transition: 0.2s;
    }
    .nav-item.active {
      background: var(--surface-card);
      color: var(--text-main);
      border: 1px solid var(--border);
    }
    .nav-item.active i { color: var(--primary); }

    .panel-box { display: none; background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-md); margin-top: 12px; text-align: right; }
    .history-card { background: var(--surface-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 11px; text-align: right; }
  </style>
</head>
<body>

<div class="app-container">

  <!-- Top Hero Header with your custom image link -->
  <div class="hero-card">
    <img src="https://iili.io/CNtFtxS.jpg" alt="Custom Horse Track Image">
    <div class="hero-overlay">
      <div class="top-nav-row">
        <div class="icon-btn" onclick="alert('لا توجد إشعارات جديدة')"><i data-lucide="bell" style="width: 20px; height: 20px;"></i></div>
        <div class="status-badge" onclick="connectBLE()" style="cursor: pointer;">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">غير متصل</span>
        </div>
      </div>
      <div class="hero-main-content">
        <div class="hero-title-text">
          <div class="dr-badge-wrapper">
            <span class="dr-brand-tag">DR.S</span>
          </div>
          <h1>تتبع الخيل</h1>
          <p>الاتصال بجهاز البلوتوث (ESP32)</p>
        </div>
        <div class="logo-badge">
          <i data-lucide="shield" style="width: 26px; height: 26px;"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Top Mini Stats Grid -->
  <div class="top-stats-grid">
    <div class="mini-stat-card">
      <div class="mini-stat-icon"><i data-lucide="zap" style="width: 20px; height: 20px;"></i></div>
      <div class="mini-stat-info">
        <div class="label">أعلى سرعة</div>
        <div class="val" id="topSpeed">0.0</div>
        <div class="unit">كم / س</div>
      </div>
    </div>
    <div class="mini-stat-card">
      <div class="mini-stat-icon"><i data-lucide="trending-up" style="width: 20px; height: 20px;"></i></div>
      <div class="mini-stat-info">
        <div class="label">المتوسط</div>
        <div class="val" id="avgSpeed">0.0</div>
        <div class="unit">كم / س</div>
      </div>
    </div>
  </div>

  <!-- Map Box -->
  <div class="map-box-card">
    <div class="map-header-label">
      <span>خريطة المسار الحالي</span>
      <span id="gpsAccuracy" style="font-size: 10px; color: var(--text-muted);">دقة GPS: --</span>
    </div>
    <div class="canvas-container" id="canvasContainer">
      <img src="https://iili.io/CNtFtxS.jpg" class="canvas-background-image" alt="Map BG">
      <canvas id="pathCanvas" width="400" height="190"></canvas>
      <div class="map-controls-abs">
        <button class="btn-reset-map" onclick="resetMapView()"><i data-lucide="rotate-ccw" style="width: 14px; height: 14px;"></i> إعادة الضبط</button>
      </div>
    </div>
  </div>

  <!-- Tip Strip -->
  <div class="tip-strip">
    <span>اسحب للتحرك السلس، وعجلة الماوس للتكبير والتصغير.</span>
    <i data-lucide="navigation" style="width: 16px; height: 16px; color: var(--primary);"></i>
  </div>

  <!-- History Strip -->
  <div class="history-strip" onclick="toggleHistoryView()">
    <div class="history-strip-title"><i data-lucide="archive" style="width: 18px; height: 18px; color: var(--primary);"></i> أرشيف الجولات المحفوظة</div>
    <i data-lucide="chevron-left" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
  </div>

  <div id="historyExpandPanel" class="panel-box">
    <div id="historyContainer"><p style="font-size: 11px; color: var(--text-muted); text-align: center;">لا توجد جولات محفوظة حالياً.</p></div>
  </div>

  <!-- Main Speed & Controls Dashboard Card -->
  <div class="main-control-card">
    <div class="main-stats-split">
      <div class="side-stat-box">
        <div class="h"><i data-lucide="clock" style="width: 14px; height: 14px; color: var(--accent);"></i> الزمن</div>
        <div class="v" id="timeElapsed" style="font-size: 16px; color: #34d399;">00:00</div>
        <img src="https://iili.io/CNtFtxS.jpg" alt="Horse">
      </div>

      <div class="speedometer-circle">
        <div class="speed-horse-icon"><i data-lucide="shield" style="width: 18px; height: 18px;"></i></div>
        <div class="speed-main-val" id="currSpeed">0.0</div>
        <div class="speed-main-unit">كم / س</div>
      </div>

      <div class="side-stat-box">
        <div class="h"><i data-lucide="map-pin" style="width: 14px; height: 14px; color: var(--primary);"></i> المسافة</div>
        <div class="v" id="totalDist" style="font-size: 16px;">0 م</div>
        <img src="https://iili.io/CNtFtxS.jpg" alt="Horse">
      </div>
    </div>

    <div class="action-btn-row">
      <button class="btn-custom btn-stop-pro" onclick="stopTrip()">
        <i data-lucide="square" style="width: 18px; height: 18px;"></i> إيقاف
      </button>
      <button class="btn-custom btn-start-pro" onclick="startTrip()">
        <i data-lucide="play" style="width: 18px; height: 18px;"></i> انطلاق
      </button>
    </div>
  </div>

  <!-- Report Section Panel -->
  <div id="reportSection" class="panel-box" style="border-color: var(--primary);">
    <div style="font-size: 14px; color: var(--primary); font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
      <i data-lucide="file-text" style="width: 16px; height: 16px;"></i> تقرير الجولة التحليلي
    </div>
    <p id="summaryText" style="font-size: 12px; margin: 0 0 10px 0; line-height: 1.6; color: var(--text-muted); text-align: right;"></p>
    <button class="btn-custom btn-start-pro" style="width: 100%; margin-top: 10px;" onclick="saveCombinedReportImage()">
      <i data-lucide="download" style="width: 16px; height: 16px;"></i> تصدير التقرير كصورة فاخرة
    </button>
  </div>

</div>

<!-- Bottom Navigation Bar -->
<div class="bottom-nav">
  <button class="nav-item" onclick="alert('شاشة الإعدادات')">
    <i data-lucide="settings" style="width: 20px; height: 20px;"></i>
    الإعدادات
  </button>
  <button class="nav-item" onclick="toggleHistoryView()">
    <i data-lucide="bar-chart-2" style="width: 20px; height: 20px;"></i>
    الإحصائيات
  </button>
  <button class="nav-item active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <i data-lucide="home" style="width: 20px; height: 20px;"></i>
    الرئيسية
  </button>
  <button class="nav-item" onclick="toggleHistoryView()">
    <i data-lucide="archive" style="width: 20px; height: 20px;"></i>
    الأرشيف
  </button>
</div>

<script>
  lucide.createIcons();

  let bluetoothDevice, bleCharacteristic;
  let isTracking = false, tripLog = [];
  let watchId = null, timerInterval = null;
  let originLat = null, originLng = null;
  let totalDist = 0, topSpeedVal = 0, startTime = 0, elapsedTime = 0, tripStartTimeStr = "";
  
  let canvas = document.getElementById('pathCanvas');
  let ctx = canvas.getContext('2d');
  let renderedPoints = [];
  let savedTrips = JSON.parse(localStorage.getItem('horse_trips_pro_history')) || [];

  let zoomScale = 1.0, panX = 0, panY = 0;
  let isDragging = false, startX = 0, startY = 0;
  let pointers = new Map();

  const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
  const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

  function updateStatus(text, isActive) {
    document.getElementById('statusText').innerText = text;
    let dot = document.getElementById('statusDot');
    if (isActive) dot.classList.add('active'); else dot.classList.remove('active');
  }

  async function connectBLE() {
    try {
      updateStatus("جاري البحث...", false);
      bluetoothDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'HorseTracker_BLE' }],
        optionalServices: [SERVICE_UUID]
      });
      const server = await bluetoothDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleCharacteristic = await service.getCharacteristic(CHAR_UUID);
      updateStatus("متصل", true);
    } catch (error) {
      updateStatus("فشل الاتصال", false);
    }
  }

  function resizeCanvas() {
    let ratio = window.devicePixelRatio || 1;
    let displayWidth = canvas.clientWidth;
    canvas.width = displayWidth * ratio;
    canvas.height = 190 * ratio;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    drawPath(tripLog);
  }
  window.addEventListener('resize', resizeCanvas);

  function project(lat, lng, origLat, origLng) {
    let x = (lng - origLng) * Math.cos(origLat * Math.PI/180) * 111320;
    let y = (lat - origLat) * 110540;
    return {x: x, y: y};
  }

  function calculateDistance(lat1, lon1, lat2, lon2) {
    let dLat = (lat2 - lat1) * Math.PI / 180;
    let dLon = (lon2 - lon1) * Math.PI / 180;
    let a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return 6371000.0 * c;
  }

  function resetMapView() { zoomScale = 1.0; panX = 0; panY = 0; drawPath(tripLog); }

  function drawPath(dataLog) {
    let w = canvas.clientWidth, h = 190;
    ctx.clearRect(0, 0, w, h);
    renderedPoints = [];
    
    if (!dataLog || dataLog.length === 0) {
      return;
    }
    
    let origLat = dataLog[0].lat, origLng = dataLog[0].lng;
    let pts = dataLog.map(p => project(p.lat, p.lng, origLat, origLng));
    let minX = Math.min(...pts.map(p => p.x)), maxX = Math.max(...pts.map(p => p.x));
    let minY = Math.min(...pts.map(p => p.y)), maxY = Math.max(...pts.map(p => p.y));
    let rangeX = Math.max(maxX - minX, 5), rangeY = Math.max(maxY - minY, 5);
    let pad = 25;
    let baseScale = Math.min((w - pad * 2) / rangeX, (h - pad * 2) / rangeY);
    let scale = baseScale * zoomScale;
    
    let cx0 = w / 2 - ((minX + maxX) / 2) * scale + panX;
    let cy0 = h / 2 + ((minY + maxY) / 2) * scale + panY;

    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = Math.max(2, 3 * Math.min(zoomScale, 2.0)); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    pts.forEach((p, i) => {
      let cx = cx0 + p.x * scale, cy = cy0 - p.y * scale;
      if (dataLog === tripLog) renderedPoints.push({cx: cx, cy: cy, logIndex: i});
      if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
    });
    ctx.stroke();
  }

  let container = document.getElementById('canvasContainer');
  container.addEventListener('pointerdown', (e) => {
    pointers.set(e.pointerId, e);
    if (pointers.size === 1) { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; }
    container.setPointerCapture(e.pointerId);
  });
  container.addEventListener('pointermove', (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, e);
    if (pointers.size === 1 && isDragging) {
      panX = e.clientX - startX; panY = e.clientY - startY;
      requestAnimationFrame(() => drawPath(tripLog));
    }
  });
  function clearPointer(e) { pointers.delete(e.pointerId); if (pointers.size === 0) isDragging = false; try{container.releasePointerCapture(e.pointerId);}catch(err){} }
  container.addEventListener('pointerup', clearPointer);
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomScale = e.deltaY < 0 ? Math.min(zoomScale + 0.15, 10.0) : Math.max(zoomScale - 0.15, 0.4);
    requestAnimationFrame(() => drawPath(tripLog));
  }, { passive: false });

  function formatTime(totalSeconds) {
    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = Math.floor(totalSeconds % 60);
    let mm = String(m).padStart(2,'0'), ss = String(s).padStart(2,'0');
    return h > 0 ? (h + ':' + mm + ':' + ss) : (mm + ':' + ss);
  }

  function startTrip() {
    if (!navigator.geolocation) { alert('الـ GPS غير مدعوم'); return; }
    isTracking = true; tripLog = []; originLat = null; originLng = null; topSpeedVal = 0; totalDist = 0; elapsedTime = 0;
    zoomScale = 1.0; panX = 0; panY = 0;
    startTime = Date.now(); tripStartTimeStr = new Date().toLocaleTimeString();
    
    document.getElementById('reportSection').style.display = 'none';
    updateStatus('جاري التسجيل', true);
    document.getElementById('timeElapsed').innerText = "00:00";
    drawPath(tripLog);

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!isTracking) return;
      elapsedTime++;
      document.getElementById('timeElapsed').innerText = formatTime(elapsedTime);
      let avg = (elapsedTime > 0 && totalDist > 0) ? (totalDist/1000.0)/(elapsedTime/3600.0) : 0;
      document.getElementById('avgSpeed').innerText = avg.toFixed(1);
    }, 1000);

    watchId = navigator.geolocation.watchPosition(onPosition, onError, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
  }

  function stopTrip() {
    if (!isTracking) return;
    isTracking = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    updateStatus('متوقف', false);
    
    if(tripLog.length > 0) {
      let finalTime = elapsedTime > 0 ? elapsedTime : 1;
      let avgAll = (totalDist / 1000.0) / (finalTime / 3600.0);
      document.getElementById('summaryText').innerHTML = `• إجمالي المسافة: <b>${totalDist.toFixed(1)} متر</b><br>• الزمن الإجمالي: <b>${formatTime(finalTime)}</b><br>• متوسط السرعة: <b>${avgAll.toFixed(1)} كم/س</b><br>• السرعة القصوى: <b>${topSpeedVal.toFixed(1)} كم/س</b>`;
      document.getElementById('reportSection').style.display = 'block';

      savedTrips.unshift({
        id: Date.now(), name: "جولة " + new Date().toLocaleDateString() + " (" + tripStartTimeStr + ")",
        dist: totalDist, time: finalTime, topSpeed: topSpeedVal, avgSpeed: avgAll, log: tripLog
      });
      localStorage.setItem('horse_trips_pro_history', JSON.stringify(savedTrips));
      renderHistory();
    }
  }

  function onPosition(position) {
    if (!isTracking) return;
    let lat = position.coords.latitude, lng = position.coords.longitude, accuracy = position.coords.accuracy || 999;
    document.getElementById('gpsAccuracy').innerText = 'دقة GPS: ' + Math.round(accuracy) + ' م';
    if (accuracy > 25) return;

    let speed = position.coords.speed ? position.coords.speed * 3.6 : 0;
    if (originLat === null) { originLat = lat; originLng = lng; }

    let pointAdded = false;
    if (tripLog.length === 0) { totalDist = 0.0; pointAdded = true; }
    else {
      let last = tripLog[tripLog.length - 1];
      let step = calculateDistance(last.lat, last.lng, lat, lng);
      if (step >= 1.0 && step < 150) { totalDist += step; pointAdded = true; }
    }

    document.getElementById('currSpeed').innerText = speed.toFixed(1);
    document.getElementById('totalDist').innerText = totalDist.toFixed(0) + ' م';
    if (speed > topSpeedVal) { topSpeedVal = speed; document.getElementById('topSpeed').innerText = topSpeedVal.toFixed(1); }

    if (pointAdded) {
      tripLog.push({dist: totalDist, time: elapsedTime, speed: speed, lat: lat, lng: lng});
      drawPath(tripLog);
    }
  }

  function toggleHistoryView() {
    let p = document.getElementById('historyExpandPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  }

  function renderHistory() {
    let container = document.getElementById('historyContainer');
    if (savedTrips.length === 0) { container.innerHTML = '<p style="font-size: 11px; color: var(--text-muted); text-align: center;">لا توجد جولات محفوظة.</p>'; return; }
    let html = '';
    savedTrips.forEach((trip) => {
      html += `<div class="history-card"><b>${trip.name}</b><br>المسافة: ${trip.dist.toFixed(1)}م | الزمن: ${formatTime(trip.time)}</div>`;
    });
    container.innerHTML = html;
  }

  function saveCombinedReportImage() {
    let exportCanvas = document.createElement('canvas');
    exportCanvas.width = 700; exportCanvas.height = 500;
    let eCtx = exportCanvas.getContext('2d');
    eCtx.fillStyle = '#0b0f15'; eCtx.fillRect(0, 0, 700, 500);
    eCtx.fillStyle = '#f8fafc'; eCtx.font = 'bold 20px Cairo'; eCtx.textAlign = 'right';
    eCtx.fillText("تقرير جولة تتبع الخيل الاحترافي", 660, 45);
    eCtx.fillStyle = '#8c9cb6'; eCtx.font = '14px Cairo';
    let lines = document.getElementById('summaryText').innerText.split('<br>');
    let startY = 100;
    lines.forEach(line => {
      let clean = line.replace(/<\/?[^>]+(>|$)/g, "");
      if(clean) { eCtx.fillText(clean, 660, startY); startY += 30; }
    });
    let link = document.createElement('a');
    link.download = 'Equestrian_Report.png';
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
  }

  function onError(error) { console.log(error); }
  resizeCanvas();
  renderHistory();
</script>
</body>
</html>
